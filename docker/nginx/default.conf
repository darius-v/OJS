server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 64m;

    access_log /var/log/nginx/ojs-access.log;
    error_log /var/log/nginx/ojs-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(files|cache)/ {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(?:ini|log|conf|sql|bak|sh|inc|dist|tpl)$ {
        deny all;
        return 404;
    }

    location ~ ^(.+\.php)(/.*)?$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}

