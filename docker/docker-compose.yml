services:
  nginx:
    image: nginx:alpine
    container_name: ojs-nginx
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ojs_files:/var/www/html/files
      - ojs_public:/var/www/html/public
      - ojs_cache:/var/www/html/cache
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: "8.5"
    container_name: ojs-php
    volumes:
      - ..:/var/www/html
      - ojs_files:/var/www/html/files
      - ojs_public:/var/www/html/public
      - ojs_cache:/var/www/html/cache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      OJS_DB_HOST: mysql
      OJS_DB_NAME: ojs
      OJS_DB_USER: ojs
      OJS_DB_PASSWORD: ojs
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: ojs-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ojs
      MYSQL_USER: ojs
      MYSQL_PASSWORD: ojs
      MYSQL_ROOT_PASSWORD: root
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ojs-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  ojs_files:
  ojs_public:
  ojs_cache:
